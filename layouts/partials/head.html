<!-- layouts/partials/head.html -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Theme Initialization - Must be in head -->
<script src="{{ "js/theme.js" | relURL }}"></script>

<!-- Page Title -->
<title>{{ .Title }} | {{ .Site.Title }}</title>

<!-- SEO Metadata -->
{{- $p := .Params -}}
{{- $d := $p.description | default site.Params.description -}}
{{- $metaDesc := or (and $p.descriptionHTML ($p.metaDescription | default ($d | plainify))) $d -}}
<meta name="description" content="{{ $metaDesc }}">
<meta name="keywords" content="{{ .Params.keywords | default .Site.Params.keywords }}">
<meta name="author" content="{{ .Params.author | default site.Params.author | default "Don Abdisalam" }}">

<!-- Open Graph Metadata -->
<meta property="og:title" content="{{ .Title }} | {{ .Site.Title }}">
<meta property="og:description" content="{{ $metaDesc }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:image" content="{{ .Params.image | default "default-og-image.png" | relURL }}">

<!-- Twitter Card Metadata -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ .Title }} | {{ .Site.Title }}">
<meta name="twitter:description" content="{{ $metaDesc }}">
<meta name="twitter:image" content="{{ .Params.image | default "default-og-image.png" | relURL }}">

<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="{{ "images/favicon34.ico" | relURL }}">

<!-- Stylesheets -->
<link rel="stylesheet" href="{{ "css/sirabdi.css" | relURL }}">

<!-- Additional Resources -->
